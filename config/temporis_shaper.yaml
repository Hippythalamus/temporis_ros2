# -------------------------------------------------------------------
# Recommended local simulation profile
# -------------------------------------------------------------------
#
# QUEUE:
#   Simple bandwidth-limited latency model
#
# ZENOH_QUEUE:
#   Client-router-subscriber transport approximation
#
# Typical local simulation:
#   model: "QUEUE"
#   bandwidth: 70.0
#   propagation_delay: 0.05
#
# -------------------------------------------------------------------
temporis_shaper:
  ros__parameters:

    output_csv: "/home/evg/Desktop/temporis_ros2/log/cc.cvs"

    # ------------------------------------------------------------
    # Topics
    # ------------------------------------------------------------

    input_topic: "/temporis/raw/states"
    output_topic: "/fleet/states"

    # ------------------------------------------------------------
    # Multi-agent
    # ------------------------------------------------------------

    num_agents: 50
    namespace_prefix: "robot_"

    # ------------------------------------------------------------
    # Runtime
    # ------------------------------------------------------------

    enabled: true
    publish_diagnostics: true

    # ------------------------------------------------------------
    # Model
    # ------------------------------------------------------------

    model: "ZENOH_QUEUE"

    # ------------------------------------------------------------
    # Topology
    # ------------------------------------------------------------

    topology: "random_k"
    topology_k: 5

    # ------------------------------------------------------------
    # QUEUE model
    # ------------------------------------------------------------

    bandwidth: 70.0
    propagation_delay: 0.05

    # ------------------------------------------------------------
    # ZENOH_QUEUE model
    # ------------------------------------------------------------

    client_bandwidth: 1000.0
    packet_size: 1.0

    propagation_client_router: 0.000150
    propagation_router_subscriber: 0.000150

    router_base_cost: 0.000108
    router_per_sub_cost: 0.0000027

    # ------------------------------------------------------------
    # Optional stochastic bandwidth dynamics
    # ------------------------------------------------------------

    bandwidth_logstd: 0.0
    bandwidth_rho: 0.0

    seed: 42